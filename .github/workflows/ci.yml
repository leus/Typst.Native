name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Build the native library on each platform
  # ---------------------------------------------------------------------------
  native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            lib: libtypst_ffi.so
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            lib: libtypst_ffi.so
          - os: macos-latest
            rid: osx-x64
            lib: libtypst_ffi.dylib
            target: x86_64-apple-darwin
          - os: macos-latest
            rid: osx-arm64
            lib: libtypst_ffi.dylib
            target: aarch64-apple-darwin
          - os: windows-latest
            rid: win-x64
            lib: typst_ffi.dll

    runs-on: ${{ matrix.os }}
    name: Native (${{ matrix.rid }})

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/typst-ffi/target/
          key: cargo-${{ matrix.rid }}-${{ hashFiles('native/typst-ffi/Cargo.toml') }}
          restore-keys: cargo-${{ matrix.rid }}-

      - name: Build native library (release)
        working-directory: native/typst-ffi
        run: cargo build --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Run Rust tests
        if: ${{ !matrix.target || matrix.target == 'aarch64-apple-darwin' }}
        working-directory: native/typst-ffi
        run: cargo test --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.rid }}
          path: native/typst-ffi/target/${{ matrix.target && format('{0}/release', matrix.target) || 'release' }}/${{ matrix.lib }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build and test the .NET solution
  # ---------------------------------------------------------------------------
  dotnet:
    needs: native
    runs-on: ubuntu-latest
    name: .NET Build & Test

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      # Download all native artifacts into the runtimes folder structure
      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/native

      - name: Arrange native binaries
        run: |
          for rid in win-x64 linux-x64 linux-arm64 osx-x64 osx-arm64; do
            mkdir -p src/Typst.Native.Runtime/runtimes/$rid/native
            cp artifacts/native/native-$rid/* src/Typst.Native.Runtime/runtimes/$rid/native/
          done

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  # ---------------------------------------------------------------------------
  # Pack NuGet (but don't publish — that's in release.yml)
  # ---------------------------------------------------------------------------
  pack:
    needs: dotnet
    runs-on: ubuntu-latest
    name: Pack NuGet

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/native

      - name: Arrange native binaries
        run: |
          for rid in win-x64 linux-x64 linux-arm64 osx-x64 osx-arm64; do
            mkdir -p src/Typst.Native.Runtime/runtimes/$rid/native
            cp artifacts/native/native-$rid/* src/Typst.Native.Runtime/runtimes/$rid/native/
          done

      - name: Pack
        run: |
          dotnet pack src/Typst.Native.Runtime/Typst.Native.Runtime.csproj -c Release -o artifacts/packages
          dotnet pack src/Typst.Native/Typst.Native.csproj -c Release -o artifacts/packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg
