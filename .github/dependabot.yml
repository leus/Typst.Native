# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2

updates:
  # Rust (Cargo) dependencies
  - package-ecosystem: cargo
    directory: /native/typst-ffi
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(rust):"
    labels:
      - dependencies
      - rust
    open-pull-requests-limit: 10
    ignore:
      # All typst crates must stay on the same minor version as `typst`
      # itself — bump them together, manually.
      - dependency-name: "typst-render"
        update-types:
          - version-update:semver-minor
      - dependency-name: "typst-pdf"
        update-types:
          - version-update:semver-minor
      - dependency-name: "typst-svg"
        update-types:
          - version-update:semver-minor
      - dependency-name: "typst-kit"
        update-types:
          - version-update:semver-minor

  # .NET (NuGet) dependencies
  - package-ecosystem: nuget
    directory: /src
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(dotnet):"
    labels:
      - dependencies
      - dotnet
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(actions):"
    labels:
      - dependencies
      - ci
