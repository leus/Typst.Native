# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2

updates:
  # Rust (Cargo) dependencies
  - package-ecosystem: cargo
    directory: /native/typst-ffi
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(rust):"
    labels:
      - dependencies
      - rust
    open-pull-requests-limit: 10

  # .NET (NuGet) dependencies
  - package-ecosystem: nuget
    directory: /src
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(dotnet):"
    labels:
      - dependencies
      - dotnet
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(actions):"
    labels:
      - dependencies
      - ci
